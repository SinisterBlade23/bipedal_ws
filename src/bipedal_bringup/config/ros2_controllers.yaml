controller_manager:
  ros__parameters:
    update_rate: 100
    use_sim_time: true
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    joint_position_controller:
      type: position_controllers/JointGroupPositionController
    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

joint_position_controller:
  ros__parameters:
    use_sim_time: true
    joints:
      - left_base_thigh
      - left_thigh_calf
      - right_base_thigh
      - right_thigh_calf
    interface_name: position

diff_drive_controller:
  ros__parameters:
    use_sim_time: true
    left_wheel_names: ["left_calf_wheel"]
    right_wheel_names: ["right_calf_wheel"]
    wheel_separation: 0.23028
    wheel_radius: 0.045